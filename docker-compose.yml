version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kdockerck-postgres
    environment:
      POSTGRES_USER: kdockerck
      POSTGRES_PASSWORD: kdockerck
      POSTGRES_DB: kdockerck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kdockerck"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: