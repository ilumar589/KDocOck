name: kdockerck-test
version: '3.1'

services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: kdockerck-test-db
    environment:
      POSTGRES_USER: kdockerck
      POSTGRES_PASSWORD: kdockerck
      POSTGRES_DB: kdockerck_test
    ports:
      - "5433:5433"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kdockerck"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data: